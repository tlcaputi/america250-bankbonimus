# Regions (map colors + labels)
regions:
  - id: philadelphia
    label: "Philadelphia"
    color: "#3a5a8a"
    blurb: "Center City, Old City & the Parkway — Wawa Welcome America, Independence Hall, the museums."
  - id: bucks
    label: "Bucks & Montgomery (PA)"
    color: "#b05e3a"
    blurb: "New Hope, Doylestown, Washington Crossing & Peddler's Village (Bucks) plus Valley Forge, Norristown & the Montgomery County suburbs."
  - id: nj
    label: "Central New Jersey"
    color: "#1d3c34"
    blurb: "Lambertville, Trenton, Princeton, Hopewell/Titusville, Hunterdon & the Washington Crossing (NJ) side."
