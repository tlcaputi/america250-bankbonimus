title: "America250 — July 4th Weekend Guide"
description: "What to do from the July 4th, 2026 weekend through the July 11–12 weekend (America's 250th) in Philadelphia, Bucks County / New Hope, and Central New Jersey — events, dates, times, and a map."
baseurl: ""
url: "https://america250.bankbonimus.com"
og_image: "https://media.bankbonimus.com/images/bankbonimus-avatar.png"
locale: "en_US"

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

collections:
  events:
    output: true
    permalink: /event/:name/
    # Pre-sort by start time here so templates never call Liquid `sort`
    # on collection docs — GitHub Pages' Jekyll 3.10 crashes on that.
    sort_by: start

include:
  - CNAME

exclude:
  - drafts/
  - vendor/
  - .CHANGELOG/
  - .research/
  - AGENTS.md
  - CLAUDE.md
  - README.md
  - geocode.py
  - gen_events.py
  - _Gemfile.bak
  - .DS_Store
  - "**/.DS_Store"

# Image CDN: shared bankbonimus R2 media
assets_cdn: https://media.bankbonimus.com

author:
  name: "Bankbonimus"
  avatar: "https://media.bankbonimus.com/images/bankbonimus-avatar.png"

